spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "${FRONTEND_ORIGIN:http://localhost:3000}"
                allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: catalog-service-route
              uri: http://${CATALOG_SERVICE_HOST:localhost}:${CATALOG_SERVICE_PORT:8081}
              predicates:
                - Path=/api/catalog/**

            - id: ai-analyser-route
              uri: http://${AI_ANALYSER_HOST:localhost}:${AI_ANALYSER_PORT:8082}
              predicates:
                - Path=/api/analyser/**

server:
  port: 8080